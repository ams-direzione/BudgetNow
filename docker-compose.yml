services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: budgetnow-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  web:
    image: nginx:1.27-alpine
    container_name: budgetnow-web
    ports:
      - "8085:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.4
    container_name: budgetnow-db
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: budgetnow
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: budget
      MYSQL_PASSWORD: budget
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
